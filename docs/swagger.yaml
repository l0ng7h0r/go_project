basePath: /api
definitions:
  domain.Seller:
    properties:
      created_at:
        type: string
      description:
        type: string
      store_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  handler.CartItemRequest:
    properties:
      product_id:
        example: prod-12345
        type: string
      quantity:
        example: 2
        type: integer
    type: object
  handler.CategoryRequest:
    properties:
      name:
        example: Electronics
        type: string
    type: object
  handler.ConfirmPaymentRequest:
    properties:
      transaction_id:
        example: txn-987654
        type: string
    type: object
  handler.CreateOrderRequest:
    properties:
      district:
        example: Chatuchak
        type: string
      logistic:
        example: Kerry Express
        type: string
      logistic_branch:
        example: Branch 001
        type: string
      phone:
        example: "0812345678"
        type: string
      province:
        example: Bangkok
        type: string
      receiver_name:
        example: John Doe
        type: string
    type: object
  handler.CreatePaymentRequest:
    properties:
      amount:
        example: 1500.5
        type: number
      order_id:
        example: ord-123456
        type: string
    type: object
  handler.CreateProductRequest:
    properties:
      category_ids:
        example:
        - cat-1
        - cat-2
        items:
          type: string
        type: array
      description:
        example: High precision RGB gaming mouse
        type: string
      image_urls:
        example:
        - http://example.com/img1.png
        - http://example.com/img2.png
        items:
          type: string
        type: array
      name:
        example: Gaming Mouse
        type: string
      price:
        example: 1250
        type: number
      status:
        example: active
        type: string
      stock:
        example: 50
        type: integer
    type: object
  handler.CreateSellerRequest:
    properties:
      description:
        example: We sell the coolest gadgets around.
        type: string
      email:
        example: seller@example.com
        type: string
      password:
        example: seller123
        type: string
      roles:
        example:
        - seller
        items:
          type: string
        type: array
      store_name:
        example: Cool Gadgets Store
        type: string
    type: object
  handler.CreateShipmentRequest:
    properties:
      order_id:
        example: ord-123456
        type: string
      provider:
        example: Kerry Express
        type: string
      tracking_number:
        example: KER123456789TH
        type: string
    type: object
  handler.CreateUserRequest:
    properties:
      email:
        example: admin@example.com
        type: string
      password:
        example: securePassword123
        type: string
      roles:
        example:
        - admin
        - user
        items:
          type: string
        type: array
    type: object
  handler.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        type: string
    type: object
  handler.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        type: string
    type: object
  handler.UpdateOrderStatusRequest:
    properties:
      status:
        example: shipped
        type: string
    type: object
  handler.UpdateProductRequest:
    properties:
      description:
        example: Upgraded version
        type: string
      name:
        example: Gaming Mouse V2
        type: string
      price:
        example: 1500
        type: number
      status:
        example: active
        type: string
      stock:
        example: 30
        type: integer
    type: object
  handler.UpdateShipmentStatusRequest:
    properties:
      status:
        example: in_transit
        type: string
    type: object
  handler.UpdateShipmentTrackingRequest:
    properties:
      provider:
        example: Kerry Express
        type: string
      tracking_number:
        example: KER987654321TH
        type: string
    type: object
  phajay.WebhookPayload:
    properties:
      amount:
        type: number
      orderNo:
        type: string
      status:
        description: success, failed, cancelled
        type: string
      transactionId:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample e-commerce server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Golang E-Commerce API
  version: "1.0"
paths:
  /admin/categories/create:
    post:
      consumes:
      - application/json
      description: Create a new product category
      parameters:
      - description: Category details (name)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new category (Admin)
      tags:
      - admin
      - categories
  /admin/categories/delete/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a product category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a category (Admin)
      tags:
      - admin
      - categories
  /admin/categories/update/{id}:
    put:
      consumes:
      - application/json
      description: Update the name of an existing category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      - description: Category details (name)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a category (Admin)
      tags:
      - admin
      - categories
  /admin/orders:
    get:
      consumes:
      - application/json
      description: Retrieve all orders in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all orders (Admin)
      tags:
      - admin
      - orders
  /admin/orders/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update the status of an existing order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      - description: Status Update (status)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateOrderStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update order status (Admin)
      tags:
      - admin
      - orders
  /admin/payments/{id}/confirm:
    patch:
      consumes:
      - application/json
      description: Allows admin to manually confirm a payment
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      - description: Transaction details (transaction_id)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ConfirmPaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Confirm payment manually (Admin)
      tags:
      - admin
      - payments
  /admin/sellers:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all sellers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all sellers (Admin)
      tags:
      - admin
      - sellers
    post:
      consumes:
      - application/json
      description: Create a new seller account and store
      parameters:
      - description: Seller details (email, password, roles, store_name, description)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateSellerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new seller (Admin)
      tags:
      - admin
      - sellers
  /admin/sellers/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a seller account
      parameters:
      - description: Seller ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a seller (Admin)
      tags:
      - admin
      - sellers
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific seller
      parameters:
      - description: Seller ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get seller by ID (Admin)
      tags:
      - admin
      - sellers
    put:
      consumes:
      - application/json
      description: Update details of an existing seller
      parameters:
      - description: Seller ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated seller details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.Seller'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a seller (Admin)
      tags:
      - admin
      - sellers
  /admin/shipments/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update the status of a shipment
      parameters:
      - description: Shipment ID
        in: path
        name: id
        required: true
        type: string
      - description: Status update (status)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateShipmentStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update shipment status (Admin)
      tags:
      - admin
      - shipments
  /admin/shipments/{id}/tracking:
    patch:
      consumes:
      - application/json
      description: Update the tracking number and provider for a shipment
      parameters:
      - description: Shipment ID
        in: path
        name: id
        required: true
        type: string
      - description: Tracking info (provider, tracking_number)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateShipmentTrackingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update shipment tracking (Admin)
      tags:
      - admin
      - shipments
  /admin/shipments/create:
    post:
      consumes:
      - application/json
      description: Create a shipment for an order
      parameters:
      - description: Shipment details (order_id, provider, tracking_number)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateShipmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a shipment (Admin)
      tags:
      - admin
      - shipments
  /admin/users:
    get:
      consumes:
      - application/json
      description: Retrieve a list of all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all users (Admin)
      tags:
      - admin
      - users
    post:
      consumes:
      - application/json
      description: Create a new user with specified roles
      parameters:
      - description: User details (email, password, roles)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
